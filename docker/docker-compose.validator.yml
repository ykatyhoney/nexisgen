name: nexis-validator

services:
  validator:
    image: ${NEXIS_VALIDATOR_IMAGE:-rendixnetwork/nexis:latest}
    container_name: nexis-validator
    restart: unless-stopped
    env_file:
      - ${VALIDATOR_ENV_FILE:-./validator.env}
    command: ["validate"]
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
      - /root/.bittensor:rw,nosuid,nodev,noexec,size=64m,uid=0,gid=0,mode=0700
    volumes:
      - ${NEXIS_WORKDIR_HOST_PATH:-./data/nexis}:/var/lib/nexis
      - ${BT_WALLET_HOST_PATH:?BT_WALLET_HOST_PATH is required}:/root/.bittensor/wallets:ro
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: nickfedor/watchtower
    container_name: nexis-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 nexis-validator
