name: nexis-source-auth-validator

services:
  source-auth-validator:
    image: ${NEXIS_VALIDATOR_IMAGE:-rendixnetwork/nexis:latest}
    container_name: nexis-source-auth-validator
    restart: unless-stopped
    env_file:
      - ${VALIDATOR_ENV_FILE:-./validator.env}
    command: ["validate-source-auth"]
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
      - /root/.bittensor:rw,nosuid,nodev,noexec,size=64m,uid=0,gid=0,mode=0700
    volumes:
      - ${NEXIS_WORKDIR_HOST_PATH:-./data/nexis}:/var/lib/nexis
      - ${BT_WALLET_HOST_PATH:?BT_WALLET_HOST_PATH is required}:/root/.bittensor/wallets:ro
